    <path class="wave-mid" d="M65 630 C137 593 210 668 282 630 C354 592 427 668 499 630 C571 593 644 668 716 630 C788 592 861 668 933 630 C1005 593 1078 668 1150 630" fill="none" stroke="#64e4f6" stroke-width="10" stroke-linecap="round" opacity="0.38"/>
