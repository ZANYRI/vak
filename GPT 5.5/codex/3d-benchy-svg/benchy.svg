<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Animated pseudo-3D 3D Benchy boat</title>
  <desc id="desc">A polished blue pseudo-3D vector illustration of the classic 3D Benchy benchmark boat gently rocking on animated waves.</desc>

  <defs>
    <linearGradient id="hullSideGradient" x1="250" y1="390" x2="935" y2="595" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#49d7ee"/>
      <stop offset="0.24" stop-color="#22a9d8"/>
      <stop offset="0.62" stop-color="#1174b7"/>
      <stop offset="1" stop-color="#0a477c"/>
    </linearGradient>

    <linearGradient id="hullLowerGradient" x1="360" y1="520" x2="875" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1295ca"/>
      <stop offset="0.52" stop-color="#075c97"/>
      <stop offset="1" stop-color="#032f5e"/>
    </linearGradient>

    <linearGradient id="hullBowGradient" x1="260" y1="340" x2="455" y2="570" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#80f2ff"/>
      <stop offset="0.36" stop-color="#27bfe0"/>
      <stop offset="1" stop-color="#0b669e"/>
    </linearGradient>

    <linearGradient id="deckGradient" x1="360" y1="305" x2="920" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c8fbff"/>
      <stop offset="0.3" stop-color="#65dff2"/>
      <stop offset="0.74" stop-color="#159dca"/>
      <stop offset="1" stop-color="#0870a6"/>
    </linearGradient>

    <linearGradient id="rimGradient" x1="240" y1="335" x2="965" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e2ffff"/>
      <stop offset="0.18" stop-color="#86f5ff"/>
      <stop offset="0.68" stop-color="#17a8d2"/>
      <stop offset="1" stop-color="#065886"/>
    </linearGradient>

    <linearGradient id="cabinFrontGradient" x1="475" y1="190" x2="650" y2="435" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a7fbff"/>
      <stop offset="0.34" stop-color="#38c5e1"/>
      <stop offset="1" stop-color="#0b77aa"/>
    </linearGradient>

    <linearGradient id="cabinSideGradient" x1="635" y1="215" x2="800" y2="445" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#46d2e8"/>
      <stop offset="0.5" stop-color="#1494bf"/>
      <stop offset="1" stop-color="#075783"/>
    </linearGradient>

    <linearGradient id="roofGradient" x1="420" y1="150" x2="795" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#edffff"/>
      <stop offset="0.24" stop-color="#8cf6ff"/>
      <stop offset="0.72" stop-color="#22add4"/>
      <stop offset="1" stop-color="#075f91"/>
    </linearGradient>

    <linearGradient id="chimneyGradient" x1="580" y1="75" x2="704" y2="255" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d9ffff"/>
      <stop offset="0.28" stop-color="#61dff0"/>
      <stop offset="0.7" stop-color="#168fbb"/>
      <stop offset="1" stop-color="#064f78"/>
    </linearGradient>

    <linearGradient id="windowGradient" x1="460" y1="245" x2="765" y2="345" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#092340"/>
      <stop offset="0.58" stop-color="#03172d"/>
      <stop offset="1" stop-color="#000917"/>
    </linearGradient>

    <linearGradient id="portholeRimGradient" x1="390" y1="450" x2="755" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d8ffff"/>
      <stop offset="0.45" stop-color="#39d5eb"/>
      <stop offset="1" stop-color="#083d6a"/>
    </linearGradient>

    <linearGradient id="waveBrightGradient" x1="230" y1="650" x2="1000" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d5ffff" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#9df5ff" stop-opacity="0.82"/>
      <stop offset="0.52" stop-color="#38cee9" stop-opacity="0.95"/>
      <stop offset="0.84" stop-color="#9ef6ff" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#d5ffff" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="shadowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#03213d" stop-opacity="0.42"/>
      <stop offset="0.62" stop-color="#043151" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#043151" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBoatShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#022640" flood-opacity="0.28"/>
    </filter>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>

    <filter id="smallInsetShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#001c35" flood-opacity="0.45"/>
    </filter>
  </defs>

  <style>
    #benchy {
      animation: benchyRock 3.8s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: 52% 70%;
    }

    #shadow {
      animation: shadowPulse 3.8s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .wave-bg {
      animation: waveSlideSlow 6.4s linear infinite;
    }

    .wave-mid {
      animation: waveSlideMid 4.9s linear infinite;
    }

    .wave-front {
      animation: waveSlideFast 3.8s linear infinite;
    }

    .gloss-streak {
      animation: glossSweep 3.8s ease-in-out infinite;
    }

    @keyframes benchyRock {
      0%, 100% { transform: translateY(0) rotate(-2.6deg); }
      50% { transform: translateY(-8px) rotate(2.8deg); }
    }

    @keyframes shadowPulse {
      0%, 100% { transform: scaleX(1.03); opacity: 0.72; }
      50% { transform: scaleX(0.92); opacity: 0.48; }
    }

    @keyframes waveSlideSlow {
      from { transform: translateX(-84px); }
      to { transform: translateX(84px); }
    }

    @keyframes waveSlideMid {
      from { transform: translateX(74px); }
      to { transform: translateX(-74px); }
    }

    @keyframes waveSlideFast {
      from { transform: translateX(-112px); }
      to { transform: translateX(112px); }
    }

    @keyframes glossSweep {
      0% { transform: translateX(-175px); opacity: 0; }
      22% { opacity: 0.62; }
      64% { opacity: 0.18; }
      100% { transform: translateX(320px); opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      #benchy,
      #shadow,
      .wave-bg,
      .wave-mid,
      .wave-front,
      .gloss-streak {
        animation-duration: 0.001ms;
        animation-iteration-count: 1;
      }
    }
  </style>

