<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" role="img" aria-labelledby="benchyTitle benchyDesc">
  <title id="benchyTitle">Animated 3D Benchy boat</title>
  <desc id="benchyDesc">A pseudo-3D vector illustration of the 3D Benchy benchmark tugboat in glossy blue PLA plastic, shown from a three-quarter perspective. The boat gently rocks and bobs on looping waves, with a moving glossy highlight on the hull.</desc>

  <style>
    /* ---------- Animations ---------- */
    @keyframes rock {
      0%   { transform: rotate(-2.6deg) translateY(0px); }
      25%  { transform: rotate(0deg)    translateY(-8px); }
      50%  { transform: rotate(2.6deg)  translateY(0px); }
      75%  { transform: rotate(0deg)    translateY(-8px); }
      100% { transform: rotate(-2.6deg) translateY(0px); }
    }
    @keyframes driftA { from { transform: translateX(0); }    to { transform: translateX(-120px); } }
    @keyframes driftB { from { transform: translateX(0); }    to { transform: translateX(-120px); } }
    @keyframes driftC { from { transform: translateX(0); }    to { transform: translateX(-120px); } }
    @keyframes streakMove {
      0%   { transform: translateX(-260px); opacity: 0; }
      15%  { opacity: 0.85; }
      55%  { opacity: 0.85; }
      70%  { opacity: 0; }
      100% { transform: translateX(360px);  opacity: 0; }
    }
    @keyframes shadowPulse {
      0%,100% { transform: scale(1);     opacity: 0.32; }
      50%     { transform: scale(0.94);  opacity: 0.22; }
    }

    #benchy {
      transform-box: view-box;
      transform-origin: 600px 560px;
      animation: rock 3.6s ease-in-out infinite;
    }
    #wave-fg  { animation: driftA 5s  linear infinite; }
    #wave-mid { animation: driftB 8s  linear infinite; }
    #wave-bg  { animation: driftC 12s linear infinite; }

    #gloss-streak {
      transform-box: view-box;
      animation: streakMove 4.8s ease-in-out infinite;
    }
    #shadow-ellipse {
      transform-box: fill-box;
      transform-origin: center;
      animation: shadowPulse 3.6s ease-in-out infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      #benchy, #wave-fg, #wave-mid, #wave-bg, #gloss-streak, #shadow-ellipse {
        animation: none;
      }
      #gloss-streak { opacity: 0; }
    }
  </style>

  <defs>
    <!-- Gradients -->
    <linearGradient id="hullSideGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#3fb6e6"/>
      <stop offset="0.45" stop-color="#1f86c9"/>
      <stop offset="1"   stop-color="#0d4f87"/>
    </linearGradient>
    <linearGradient id="hullBottomGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#11567f"/>
      <stop offset="1"   stop-color="#06304f"/>
    </linearGradient>
    <linearGradient id="bowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#56c4ef"/>
      <stop offset="1"   stop-color="#1773b3"/>
    </linearGradient>
    <linearGradient id="deckGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#9fe3f7"/>
      <stop offset="1"   stop-color="#4fa9d8"/>
    </linearGradient>
    <linearGradient id="cabinFrontGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#6fd0f2"/>
      <stop offset="1"   stop-color="#2b8bc6"/>
    </linearGradient>
    <linearGradient id="cabinSideGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#1e7ab2"/>
      <stop offset="1"   stop-color="#0f5485"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#bff0fb"/>
      <stop offset="1"   stop-color="#62b8e2"/>
    </linearGradient>
    <linearGradient id="chimneyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#187bb6"/>
      <stop offset="0.35" stop-color="#62c6ef"/>
      <stop offset="0.6"  stop-color="#3aa3da"/>
      <stop offset="1"    stop-color="#0e5588"/>
    </linearGradient>
    <radialGradient id="chimneyTop" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0"   stop-color="#7fd6f5"/>
      <stop offset="1"   stop-color="#2f93cf"/>
    </radialGradient>
    <radialGradient id="portGrad" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0"   stop-color="#0c3552"/>
      <stop offset="1"   stop-color="#041726"/>
    </radialGradient>
    <linearGradient id="windowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#0a3a5c"/>
      <stop offset="0.5" stop-color="#06243c"/>
      <stop offset="1"   stop-color="#020e1a"/>
    </linearGradient>
    <linearGradient id="streakGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5"  stop-color="#eafaff" stop-opacity="0.9"/>
      <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="waterBase" cx="0.5" cy="0.4" r="0.75">
      <stop offset="0"   stop-color="#2aa0d8" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#0b4d7e" stop-opacity="0.0"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="castShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
    <filter id="boatDrop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#062742" flood-opacity="0.35"/>
    </filter>
    <filter id="softInner" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>

    <!-- Reusable hull-side path for the moving gloss clip -->
    <path id="hullSidePath" d="M 412 446
        C 392 452 378 470 384 492
        C 392 524 430 540 470 544
        L 700 540
        C 760 536 800 522 806 500
        L 802 452
        L 700 440
        L 470 440 Z"/>

    <clipPath id="hullClip">
      <use href="#hullSidePath"/>
    </clipPath>
  </defs>

  <!-- ===================== WATER BASE ===================== -->
  <ellipse cx="600" cy="560" rx="430" ry="86" fill="url(#waterBase)"/>

  <!-- ===================== WAVES ===================== -->
  <g id="waves">
    <g id="wave-bg" opacity="0.45">
      <path fill="#2f9ed6"
        d="M -240 512 q 30 -12 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 L 1440 700 L -240 700 Z"/>
    </g>
    <g id="wave-mid" opacity="0.7">
      <path fill="#1f87c4"
        d="M -240 556 q 30 -16 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 L 1440 720 L -240 720 Z"/>
    </g>
    <g id="wave-fg">
      <path fill="#5cc2ee"
        d="M -240 590 q 30 -18 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 L 1440 740 L -240 740 Z"/>
      <path fill="#bff0fb" opacity="0.55"
        d="M -240 590 q 30 -18 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 L 1440 600 L -240 600 Z"/>
    </g>
  </g>

  <!-- ===================== CAST SHADOW ===================== -->
  <g id="shadow">
    <ellipse id="shadow-ellipse" cx="600" cy="566" rx="250" ry="44" fill="#05314f" opacity="0.3" filter="url(#castShadow)"/>
  </g>

  <!-- ===================== BENCHY ===================== -->
  <g id="benchy" filter="url(#boatDrop)">

    <!-- HULL -->
    <g id="hull" stroke="#0a3a63" stroke-width="3" stroke-linejoin="round">
      <!-- lower curved body / front-facing surface -->
      <path fill="url(#hullBottomGrad)"
        d="M 384 492 C 392 524 430 548 478 552 L 706 548 C 766 544 804 528 808 502
           C 800 522 762 536 702 540 L 470 544 C 430 540 392 524 384 492 Z"/>
      <!-- main starboard side wall -->
      <path fill="url(#hullSideGrad)" stroke-width="3.5"
        d="M 412 446
           C 392 452 378 470 384 492
           C 392 524 430 540 470 544
           L 700 540
           C 760 536 800 522 806 500
           L 802 452
           L 700 440
           L 470 440 Z"/>
      <!-- bow-facing surface -->
      <path fill="url(#bowGrad)" stroke-width="3.5"
        d="M 412 446 C 392 452 378 470 384 492 C 388 506 400 518 416 526
           L 432 470 C 430 456 424 448 412 446 Z"/>
      <!-- inner shadow under the upper rim -->
      <path fill="#072d4d" opacity="0.5" filter="url(#softInner)" stroke="none"
        d="M 470 448 L 700 448 C 758 451 794 462 800 476 L 800 458 L 700 446 L 470 446 Z"/>
    </g>

    <!-- DECK -->
    <g id="deck" stroke="#0a3a63" stroke-width="3" stroke-linejoin="round">
      <!-- top deck plane -->
      <path fill="url(#deckGrad)"
        d="M 470 440 L 700 440 L 802 452
           L 818 418 L 712 406 L 478 408
           C 452 410 438 420 430 432 Z"/>
      <!-- raised inner deck rim -->
      <path fill="#79c8ec" opacity="0.85" stroke="#1c6a9b" stroke-width="2"
        d="M 492 432 L 700 430 L 786 440 L 778 452 L 700 444 L 500 444 Z"/>
    </g>

    <!-- CABIN -->
    <g id="cabin" stroke="#0a3a63" stroke-width="3" stroke-linejoin="round">
      <!-- side wall (receding right) -->
      <path fill="url(#cabinSideGrad)"
        d="M 648 352 L 690 338 L 690 410 L 648 424 Z"/>
      <!-- front wall (facing viewer) -->
      <path fill="url(#cabinFrontGrad)"
        d="M 520 352 L 648 352 L 648 424 L 520 422 Z"/>
      <!-- roof thickness -->
      <path fill="#3f9bce" stroke-width="2"
        d="M 512 348 L 648 348 L 690 334 L 690 342 L 648 356 L 512 356 Z"/>
      <!-- roof top -->
      <path fill="url(#roofGrad)"
        d="M 512 348 L 648 348 L 690 334 L 556 330 Z"/>
    </g>

    <!-- CHIMNEY -->
    <g id="chimney" stroke="#0a3a63" stroke-width="2.5" stroke-linejoin="round">
      <!-- side wall -->
      <path fill="url(#chimneyGrad)"
        d="M 574 300 L 574 340 A 26 9 0 0 0 626 340 L 626 300 Z"/>
      <!-- bottom ellipse hint -->
      <ellipse cx="600" cy="340" rx="26" ry="9" fill="#0e5588" opacity="0.6" stroke="none"/>
      <!-- top ellipse -->
      <ellipse cx="600" cy="300" rx="26" ry="9" fill="url(#chimneyTop)"/>
      <!-- dark inner opening -->
      <ellipse cx="600" cy="300" rx="16" ry="5.5" fill="#04243c" stroke="none"/>
      <!-- upper rim highlight -->
      <path d="M 580 296 A 24 7.5 0 0 1 620 296" fill="none" stroke="#dff6ff" stroke-width="2.2" stroke-linecap="round"/>
    </g>

    <!-- WINDOWS -->
    <g id="windows" stroke="#0a3a63" stroke-width="2.2" stroke-linejoin="round">
      <!-- large front window -->
      <rect x="536" y="368" width="78" height="40" rx="9" fill="url(#windowGrad)"/>
      <path d="M 542 374 L 600 372" stroke="#5fd0f5" stroke-width="2.4" stroke-linecap="round" opacity="0.7"/>
      <!-- side window -->
      <path fill="url(#windowGrad)" d="M 656 364 L 684 354 L 684 392 L 656 402 Z"/>
      <path d="M 660 368 L 680 360" stroke="#5fd0f5" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    </g>

    <!-- DETAILS -->
    <g id="details" stroke="none">
      <!-- portholes -->
      <g stroke="#0a3a63" stroke-width="2.4">
        <circle cx="486" cy="496" r="15" fill="url(#portGrad)"/>
        <circle cx="560" cy="500" r="15" fill="url(#portGrad)"/>
        <circle cx="634" cy="500" r="15" fill="url(#portGrad)"/>
      </g>
      <!-- porthole rim highlights + glossy reflections -->
      <g stroke="none">
        <path d="M 476 488 A 15 15 0 0 1 496 487" fill="none" stroke="#bdeafc" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
        <path d="M 550 492 A 15 15 0 0 1 570 491" fill="none" stroke="#bdeafc" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
        <path d="M 624 492 A 15 15 0 0 1 644 491" fill="none" stroke="#bdeafc" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
        <circle cx="481" cy="491" r="3" fill="#eafaff" opacity="0.8"/>
        <circle cx="555" cy="495" r="3" fill="#eafaff" opacity="0.8"/>
        <circle cx="629" cy="495" r="3" fill="#eafaff" opacity="0.8"/>
      </g>

      <!-- horizontal layer lines (3D print texture), clipped to hull -->
      <g clip-path="url(#hullClip)" stroke="#0c4470" stroke-width="1" opacity="0.28">
        <line x1="384" y1="468" x2="806" y2="468"/>
        <line x1="384" y1="480" x2="806" y2="480"/>
        <line x1="384" y1="492" x2="806" y2="492"/>
        <line x1="384" y1="504" x2="806" y2="504"/>
        <line x1="384" y1="516" x2="806" y2="516"/>
        <line x1="384" y1="528" x2="806" y2="528"/>
      </g>

      <!-- benchmark micro-details: small arch / bridge / overhang on hull -->
      <g stroke="#0a3a63" stroke-width="2" fill="none" opacity="0.85">
        <path d="M 686 506 a 12 12 0 0 1 24 0" />            <!-- small arch -->
        <line x1="686" y1="506" x2="686" y2="522"/>
        <line x1="710" y1="506" x2="710" y2="522"/>
        <path d="M 730 500 h 28 v 4 h -28 z" fill="#0a3a63" opacity="0.4" stroke="none"/> <!-- bridge bar -->
      </g>
      <!-- engraved tolerance hole -->
      <circle cx="752" cy="516" r="5" fill="#04243c" stroke="#0a3a63" stroke-width="1.5"/>

      <!-- vector-style "3DBenchy" label on the hull (no fonts; drawn strokes) -->
      <g stroke="#dff6ff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.92">
        <!-- 3 -->
        <path d="M 452 516 q 12 -4 12 4 q 0 6 -8 6 q 8 0 8 6 q 0 8 -12 4"/>
        <!-- D -->
        <path d="M 474 510 v 22 q 12 0 12 -11 q 0 -11 -12 -11 z"/>
        <!-- B -->
        <path d="M 498 510 v 22 q 11 0 11 -6 q 0 -5 -11 -5 q 11 0 11 -5 q 0 -6 -11 -6 z"/>
        <!-- E -->
        <path d="M 522 510 h 12 M 522 510 v 22 M 522 521 h 9 M 522 532 h 12"/>
        <!-- N -->
        <path d="M 542 532 v -22 l 14 22 v -22"/>
        <!-- C -->
        <path d="M 580 514 q -10 -6 -10 7 q 0 13 10 7"/>
        <!-- H -->
        <path d="M 590 510 v 22 M 590 521 h 12 M 602 510 v 22"/>
        <!-- Y -->
        <path d="M 612 510 l 6 10 l 6 -10 M 618 520 v 12"/>
      </g>
    </g>

    <!-- HIGHLIGHTS -->
    <g id="highlights" stroke="none" fill="none" stroke-linecap="round">
      <!-- upper hull rim highlight -->
      <path d="M 432 444 L 700 444 C 760 447 796 458 802 470" stroke="#dff6ff" stroke-width="2.6" opacity="0.85"/>
      <!-- bow edge highlight -->
      <path d="M 414 448 C 396 454 384 470 388 490" stroke="#eafaff" stroke-width="2.6" opacity="0.8"/>
      <!-- cabin roof highlight -->
      <path d="M 518 346 L 644 346" stroke="#ffffff" stroke-width="2.4" opacity="0.7"/>
      <!-- deck rim highlight -->
      <path d="M 432 432 C 446 420 470 410 492 408" stroke="#eafaff" stroke-width="2" opacity="0.6"/>

      <!-- animated moving gloss streak, clipped to the hull side -->
      <g clip-path="url(#hullClip)">
        <rect id="gloss-streak" x="430" y="438" width="60" height="112" fill="url(#streakGrad)" transform="skewX(-18)"/>
      </g>
    </g>

  </g>
</svg>
