services:
  recipe-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: savora-recipe-app
    container_name: recipe-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
