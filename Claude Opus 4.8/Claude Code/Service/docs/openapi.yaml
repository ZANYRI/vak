openapi: 3.0.3
info:
  title: Billing Service API
  version: 1.0.0
  description: >
    REST API for subscription management and billing. Provides authentication,
    customer management, plans, subscriptions, usage metering, coupons, tax
    rules, invoices, and payments.


    ## Conventions

    - All monetary amounts are integers in minor units (cents) of the relevant
      currency. For example `1000` means 10.00 USD.
    - All endpoints (except auth register/login/refresh and the operational
      endpoints) require a Bearer JWT in the `Authorization` header.
    - Mutating POST endpoints that create durable resources support an optional
      `Idempotency-Key` request header to guarantee at-most-once processing.

    ## Errors

    Errors are returned with a consistent envelope. See the `Error` schema.
servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication and session management
  - name: Customers
    description: Customer records
  - name: Plans
    description: Subscription plans and pricing models
  - name: Subscriptions
    description: Customer subscriptions and lifecycle
  - name: Usage
    description: Usage metering for usage-based billing
  - name: Coupons
    description: Discount coupons
  - name: Taxes
    description: Tax rules by jurisdiction
  - name: Invoices
    description: Invoice generation and lifecycle
  - name: Payments
    description: Payment processing (simulated)
  - name: Admin/Health
    description: Operational endpoints (no authentication)

paths:
  #######################################################################
  # Auth
  #######################################################################
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
                role:
                  type: string
                  enum: [admin, user]
                  default: user
            example:
              email: jane@example.com
              password: s3cretpassword
              role: user
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in and obtain a token pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
            example:
              email: jane@example.com
              password: s3cretpassword
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange a refresh token for a new token pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
            example:
              refresh_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Log out and revoke a refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
            example:
              refresh_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                example:
                  message: logged out
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get the currently authenticated user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  #######################################################################
  # Customers
  #######################################################################
  /api/v1/customers:
    post:
      tags: [Customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerInput'
            example:
              email: billing@acme.test
              name: Acme Receivables
              company_name: Acme Inc.
              billing_address: 1 Market St, Suite 100
              country: US
              region: CA
              tax_id: US-123456789
              currency: USD
              user_id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
      responses:
        '201':
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      tags: [Customers]
      summary: List customers
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: A list of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/customers/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Customers]
      summary: Get a customer by ID
      responses:
        '200':
          description: Customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Customers]
      summary: Update a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerInput'
            example:
              name: Acme Receivables (Updated)
              region: NY
      responses:
        '200':
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Customers]
      summary: Delete a customer
      responses:
        '200':
          description: Customer deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  #######################################################################
  # Plans
  #######################################################################
  /api/v1/plans:
    post:
      tags: [Plans]
      summary: Create a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanInput'
            example:
              name: Pro
              description: Pro plan with seats and usage
              currency: USD
              billing_interval: monthly
              pricing_model: hybrid
              base_price_cents: 4900
              seat_price_cents: 1000
              included_seats: 5
              included_units: 1000
              unit_price_cents: 2
              usage_metric: api_calls
              trial_days: 14
              tiers:
                - from: 0
                  to: 1000
                  unit_price_cents: 2
                - from: 1001
                  to: null
                  unit_price_cents: 1
      responses:
        '201':
          description: Plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      tags: [Plans]
      summary: List plans
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: A list of plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plan'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/plans/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Plans]
      summary: Get a plan by ID
      responses:
        '200':
          description: Plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Plans]
      summary: Update a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanInput'
            example:
              base_price_cents: 5900
      responses:
        '200':
          description: Updated plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Plans]
      summary: Delete a plan
      responses:
        '200':
          description: Plan deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  #######################################################################
  # Subscriptions
  #######################################################################
  /api/v1/subscriptions:
    post:
      tags: [Subscriptions]
      summary: Create a subscription
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, plan_id]
              properties:
                customer_id:
                  type: string
                  format: uuid
                plan_id:
                  type: string
                  format: uuid
                quantity:
                  type: integer
                  minimum: 1
                  default: 1
            example:
              customer_id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
              plan_id: 1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed
              quantity: 5
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      tags: [Subscriptions]
      summary: List subscriptions
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: A list of subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/subscriptions/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Subscriptions]
      summary: Get a subscription by ID
      responses:
        '200':
          description: Subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Subscriptions]
      summary: Update a subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
                  minimum: 1
                cancel_at_period_end:
                  type: boolean
            example:
              quantity: 10
              cancel_at_period_end: false
      responses:
        '200':
          description: Updated subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/subscriptions/{id}/cancel:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Subscriptions]
      summary: Cancel a subscription
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                at_period_end:
                  type: boolean
                  default: false
            example:
              at_period_end: true
      responses:
        '200':
          description: Subscription canceled (or scheduled to cancel)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/subscriptions/{id}/pause:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Subscriptions]
      summary: Pause a subscription
      responses:
        '200':
          description: Subscription paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/subscriptions/{id}/resume:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Subscriptions]
      summary: Resume a paused subscription
      responses:
        '200':
          description: Subscription resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/subscriptions/{id}/change-plan:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Subscriptions]
      summary: Change the plan of a subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id]
              properties:
                plan_id:
                  type: string
                  format: uuid
            example:
              plan_id: 1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed
      responses:
        '200':
          description: Plan changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/subscriptions/{id}/apply-coupon:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Subscriptions]
      summary: Apply a coupon to a subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, currency]
              properties:
                code:
                  type: string
                currency:
                  type: string
                  example: USD
            example:
              code: WELCOME20
              currency: USD
      responses:
        '200':
          description: Coupon applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  #######################################################################
  # Usage
  #######################################################################
  /api/v1/usage:
    post:
      tags: [Usage]
      summary: Record a usage event
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, subscription_id, metric, quantity, idempotency_key]
              properties:
                customer_id:
                  type: string
                  format: uuid
                subscription_id:
                  type: string
                  format: uuid
                metric:
                  type: string
                  example: api_calls
                quantity:
                  type: integer
                  format: int64
                  minimum: 0
                idempotency_key:
                  type: string
                  description: Unique key guaranteeing the event is recorded at most once.
                recorded_at:
                  type: string
                  format: date-time
            example:
              customer_id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
              subscription_id: 9a1c5f2e-3b7d-4f8a-9c2e-1d4b6f8a0c3e
              metric: api_calls
              quantity: 250
              idempotency_key: usage-2026-06-20-batch-42
              recorded_at: 2026-06-20T12:00:00Z
      responses:
        '201':
          description: Usage event recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageEvent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Idempotency conflict (key reused with different payload)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: IDEMPOTENCY_CONFLICT
                  message: idempotency key reused with a different request body
                  details: {}
    get:
      tags: [Usage]
      summary: List usage events
      parameters:
        - name: subscription_id
          in: query
          schema:
            type: string
            format: uuid
        - name: customer_id
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: A list of usage events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsageEvent'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/usage/summary:
    get:
      tags: [Usage]
      summary: Get aggregated usage for a subscription
      parameters:
        - name: subscription_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Usage summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscription_id:
                    type: string
                    format: uuid
                  metric:
                    type: string
                  total_quantity:
                    type: integer
                    format: int64
                example:
                  subscription_id: 9a1c5f2e-3b7d-4f8a-9c2e-1d4b6f8a0c3e
                  metric: api_calls
                  total_quantity: 12500
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  #######################################################################
  # Coupons
  #######################################################################
  /api/v1/coupons:
    post:
      tags: [Coupons]
      summary: Create a coupon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CouponInput'
            example:
              code: WELCOME20
              type: percentage
              percent_off: 20
              currency: USD
              max_redemptions: 100
              valid_from: 2026-01-01T00:00:00Z
              valid_until: 2026-12-31T23:59:59Z
      responses:
        '201':
          description: Coupon created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      tags: [Coupons]
      summary: List coupons
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: A list of coupons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Coupon'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/coupons/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Coupons]
      summary: Get a coupon by ID
      responses:
        '200':
          description: Coupon
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Coupons]
      summary: Update a coupon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CouponInput'
            example:
              max_redemptions: 250
      responses:
        '200':
          description: Updated coupon
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Coupons]
      summary: Delete a coupon
      responses:
        '200':
          description: Coupon deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  #######################################################################
  # Taxes
  #######################################################################
  /api/v1/tax-rules:
    post:
      tags: [Taxes]
      summary: Create a tax rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaxRuleInput'
            example:
              country: US
              region: CA
              tax_name: CA Sales Tax
              tax_rate_basis_points: 725
      responses:
        '201':
          description: Tax rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxRule'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      tags: [Taxes]
      summary: List tax rules
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: A list of tax rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaxRule'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/tax-rules/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Taxes]
      summary: Get a tax rule by ID
      responses:
        '200':
          description: Tax rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxRule'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Taxes]
      summary: Update a tax rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaxRuleInput'
