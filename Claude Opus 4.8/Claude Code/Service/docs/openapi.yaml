        currency: USD
        subtotal_cents: 9900
        discount_cents: 1980
        tax_cents: 574
        total_cents: 8494
        amount_due_cents: 8494
        amount_paid_cents: 0
        lines:
          - description: Pro plan base fee
            quantity: 1
            unit_price_cents: 4900
            amount_cents: 4900
          - description: Seats (5)
            quantity: 5
            unit_price_cents: 1000
            amount_cents: 5000
        created_at: 2026-06-20T10:00:00Z

    Payment:
      type: object
      properties:
        id:
