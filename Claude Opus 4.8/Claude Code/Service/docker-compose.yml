services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing
      POSTGRES_DB: billing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing -d billing"]
      interval: 5s
      timeout: 5s
      retries: 10

  queue:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: ["/app/api"]
    environment:
      APP_ENV: docker
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://billing:billing@postgres:5432/billing?sslmode=disable
      DB_MAX_CONNS: "40"
      QUEUE_URL: redis://queue:6379/0
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@billing.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      queue:
        condition: service_healthy

  worker:
    build: .
    command: ["/app/worker"]
    environment:
      APP_ENV: docker
      DATABASE_URL: postgres://billing:billing@postgres:5432/billing?sslmode=disable
      DB_MAX_CONNS: "30"
      QUEUE_URL: redis://queue:6379/0
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      WORKER_CONCURRENCY: "4"
    depends_on:
      postgres:
        condition: service_healthy
      queue:
        condition: service_healthy

  scheduler:
    build: .
    command: ["/app/scheduler"]
    environment:
      APP_ENV: docker
      DATABASE_URL: postgres://billing:billing@postgres:5432/billing?sslmode=disable
      QUEUE_URL: redis://queue:6379/0
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      SCHEDULER_INTERVAL: 60s
    depends_on:
      postgres:
        condition: service_healthy
      queue:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
